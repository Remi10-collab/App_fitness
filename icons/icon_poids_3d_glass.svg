<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Poids">
  <defs>
    <linearGradient id="metal" x1="18" y1="18" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b9a7ff"/>
      <stop offset=".22" stop-color="#6247d9"/>
      <stop offset=".54" stop-color="#101331"/>
      <stop offset=".78" stop-color="#27104f"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>

    <linearGradient id="metalSoft" x1="20" y1="24" x2="104" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f1eaff"/>
      <stop offset=".25" stop-color="#7c5cff"/>
      <stop offset=".68" stop-color="#151935"/>
      <stop offset="1" stop-color="#4b2da8"/>
    </linearGradient>

    <radialGradient id="plateGlow" cx="50%" cy="44%" r="64%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity=".34"/>
      <stop offset=".38" stop-color="#7c3aed" stop-opacity=".22"/>
      <stop offset="1" stop-color="#040817" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.65 0 0 0 0.34
                0 0.35 0 0 0.18
                0 0 1 0 0.90
                0 0 0 .72 0" result="violetGlow"/>
      <feMerge>
        <feMergeNode in="violetGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#020617" flood-opacity=".55"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <ellipse cx="64" cy="114" rx="31" ry="8" fill="#020617" opacity=".44"/>

    <path d="M61 34h6v58h-6z" fill="url(#metal)"/>
    <path d="M51 94h26c2.8 0 5.2 2.2 5.6 5l1.2 8H44.2l1.2-8c.4-2.8 2.8-5 5.6-5Z" fill="url(#metalSoft)"/>
    <path d="M43 107h42c4.2 0 7.7 3 8.5 7.1l.7 3.9H33.8l.7-3.9c.8-4.1 4.3-7.1 8.5-7.1Z" fill="url(#metal)"/>

    <circle cx="64" cy="30" r="11" fill="url(#metalSoft)" stroke="#c4b5fd" stroke-width="1.5"/>
    <path d="M64 12v18" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round"/>
    <path d="M54 17h20" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" opacity=".75"/>

    <path d="M25 36c12 8 26 8 39 0 13 8 27 8 39 0" fill="none" stroke="url(#metal)" stroke-width="7" stroke-linecap="round"/>
    <path d="M22 36h84" fill="none" stroke="#d8b4fe" stroke-width="1.8" stroke-linecap="round" opacity=".55"/>

    <g filter="url(#glow)">
      <path d="M25 39 13 76h24L25 39Z" fill="none" stroke="#7dd3fc" stroke-width="2.2" opacity=".55"/>
      <path d="M103 39 91 76h24l-12-37Z" fill="none" stroke="#7dd3fc" stroke-width="2.2" opacity=".55"/>

      <path d="M9 76h32c-2.3 10-8.4 16-16 16S11.3 86 9 76Z" fill="url(#metalSoft)" stroke="#a78bfa" stroke-width="2"/>
      <path d="M87 76h32c-2.3 10-8.4 16-16 16s-13.7-6-16-16Z" fill="url(#metalSoft)" stroke="#a78bfa" stroke-width="2"/>

      <circle cx="25" cy="76" r="19" fill="url(#plateGlow)"/>
      <circle cx="103" cy="76" r="19" fill="url(#plateGlow)"/>

      <rect x="17" y="61" width="15" height="15" rx="4" fill="#141633" stroke="#d8b4fe" stroke-width="1.2"/>
      <path d="M20 58h9" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
      <circle cx="103" cy="66" r="9" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.3"/>
    </g>
  </g>

  <path d="M42 30c12 3 31 3 44 0" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity=".24"/>
</svg>