  <path d="M33.5 77.5c-2.6 6.1-2.4 12.7.8 19.8" fill="none" stroke="#fff27a" stroke-width="2.4" stroke-linecap="round" opacity=".38"/>
  <path d="M97.3 58.7c5.5 9.6 7.1 18.7 4.8 27.4" fill="none" stroke="#ffd15c" stroke-width="2.2" stroke-linecap="round" opacity=".32"/>

