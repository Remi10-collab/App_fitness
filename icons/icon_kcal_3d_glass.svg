<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Calories">
  <defs>
    <radialGradient id="glow" cx="50%" cy="78%" r="62%">
      <stop offset="0%" stop-color="#fff7a8" stop-opacity=".95"/>
      <stop offset="32%" stop-color="#ffb300" stop-opacity=".78"/>
      <stop offset="64%" stop-color="#ff6a00" stop-opacity=".36"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="flameOuter" x1="35" y1="118" x2="88" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff06a"/>
      <stop offset="26%" stop-color="#ffb000"/>
      <stop offset="62%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ffcf38"/>
    </linearGradient>

    <linearGradient id="flameInner" x1="50" y1="112" x2="75" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="36%" stop-color="#fff469"/>
      <stop offset="70%" stop-color="#ffbf1a"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </linearGradient>

    <filter id="softGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 1
                0 0.52 0 0 0.42
                0 0 0.08 0 0
                0 0 0 0.75 0" result="orangeGlow"/>
      <feMerge>
        <feMergeNode in="orangeGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tinyGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="64" cy="77" r="50" fill="url(#glow)" opacity=".85"/>

  <path filter="url(#softGlow)"
