  <path d="M65.3 113.5c-13.6 0-24.7-8.6-24.7-22.1 0-9.7 5.3-16.9 12.1-23.9 5.3-5.5 8.7-12.8 7.7-22.1 9.3 7.2 14 15.6 13.4 27.1 4.8-3.6 7.5-9 7.6-16.8 9.4 8.7 15.1 19.4 15.1 32.1 0 16.5-13.4 25.7-31.2 25.7Z"
